<div class="max-w-7xl mx-auto p-4 md:p-8 text-slate-800 dark:text-slate-100">

  <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-8">
    Controla tus finanzas donde quieras y cuando quieras.
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8">

    @for (stat of stats; track stat.title) {

    <div
      class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm flex items-start justify-between transition-all hover:shadow-md">

      <div>
        <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">
          {{ stat.title }}
        </p>

        <h2 class="text-3xl font-bold text-slate-800 dark:text-white">
          {{ stat.amount }}
        </h2>
      </div>

      <div class="p-3 rounded-xl" [ngClass]="{
          'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/40 dark:text-emerald-400': stat.color === 'emerald',
          'bg-blue-50 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400': stat.color === 'blue',
          'bg-rose-50 text-rose-600 dark:bg-rose-900/40 dark:text-rose-400': stat.color === 'rose',
          'bg-amber-50 text-amber-600 dark:bg-amber-900/40 dark:text-amber-400': stat.color === 'amber'
        }">

        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 12a2.25 2.25 0 00-2.25-2.25H15a3 3 0 11-6 0H5.25A2.25 2.25 0 003 12m18 0v6a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 18v-6m18 0V9M3 12V9m18 0a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 9m18 0V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v3" />
        </svg>

      </div>

    </div>

    }

  </div>

  <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

    <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-100 dark:border-slate-700 shadow-sm">
      <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-6">Gastos Mensuales</h2>
      <div class="w-full h-72">
        <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" [type]="lineChartType">
        </canvas>
      </div>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 border border-slate-100 dark:border-slate-700 shadow-sm flex flex-col justify-between">
      <h2 class="text-xl font-bold text-slate-800 dark:text-white mb-6">Presupuestos</h2>

      <div class="space-y-8 flex-1">

        @for (budget of budgets; track budget.title) {

        <div>

          <div class="flex justify-between mb-2 text-sm font-medium">

            <span class="text-slate-600 dark:text-slate-300">
              {{ budget.title }}
            </span>

            <span class="text-slate-800 dark:text-white">
              ${{ budget.spent }}

              <span class="text-slate-400 dark:text-slate-500">
                / ${{ budget.total }}
              </span>
            </span>

          </div>

          <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2.5">

            <div class="h-2.5 rounded-full" [style.width.%]="budget.progress" [ngClass]="{
            'bg-emerald-500': budget.color === 'emerald',
            'bg-blue-500': budget.color === 'blue',
            'bg-amber-500': budget.color === 'amber'
          }"></div>

          </div>

        </div>

        }

      </div>
    </div>

  </div>
</div>
