<div class="max-w-7xl mx-auto p-4 md:p-8 text-slate-800">
  
  <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-8">
    Controla tus finanzas donde quieras y cuando quieras.
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-8">

    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-start justify-between transition-all hover:shadow-md">
      <div>
        <p class="text-slate-500 text-sm font-medium mb-1">Balance Total</p>
        <h2 class="text-3xl font-bold text-slate-800">$12,450</h2>
      </div>
      <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a2.25 2.25 0 00-2.25-2.25H15a3 3 0 11-6 0H5.25A2.25 2.25 0 003 12m18 0v6a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 18v-6m18 0V9M3 12V9m18 0a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 9m18 0V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v3" />
        </svg>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-start justify-between transition-all hover:shadow-md">
      <div>
        <p class="text-slate-500 text-sm font-medium mb-1">Ingresos</p>
        <h2 class="text-3xl font-bold text-slate-800">$4,200</h2>
      </div>
      <div class="p-3 bg-blue-50 text-blue-600 rounded-xl">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941" />
        </svg>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-start justify-between transition-all hover:shadow-md">
      <div>
        <p class="text-slate-500 text-sm font-medium mb-1">Gastos</p>
        <h2 class="text-3xl font-bold text-slate-800">$1,780</h2>
      </div>
      <div class="p-3 bg-rose-50 text-rose-600 rounded-xl">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6L9 12.75l4.286-4.286a11.948 11.948 0 014.306 6.43l.776 2.898m0 0l3.182-5.51m-3.182 5.51l-5.511-3.181" />
        </svg>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-start justify-between transition-all hover:shadow-md">
      <div>
        <p class="text-slate-500 text-sm font-medium mb-1">Ahorros</p>
        <h2 class="text-3xl font-bold text-slate-800">$2,900</h2>
      </div>
      <div class="p-3 bg-amber-50 text-amber-600 rounded-xl">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
    </div>

  </div>

  <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

    <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
      <h2 class="text-xl font-bold text-slate-800 mb-6">Gastos Mensuales</h2>
      <div class="w-full h-72">
        <canvas baseChart 
          [data]="lineChartData" 
          [options]="lineChartOptions" 
          [type]="lineChartType">
        </canvas>
      </div>
    </div>

    <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm flex flex-col justify-between">
      <h2 class="text-xl font-bold text-slate-800 mb-6">Presupuestos</h2>

      <div class="space-y-8 flex-1">
        
        <div>
          <div class="flex justify-between mb-2 text-sm font-medium">
            <span class="text-slate-600">Comida</span>
            <span class="text-slate-800">$300 / <span class="text-slate-400">$500</span></span>
          </div>
          <div class="w-full bg-slate-100 rounded-full h-2.5">
            <div class="bg-emerald-500 h-2.5 rounded-full" style="width: 60%"></div>
          </div>
        </div>

        <div>
          <div class="flex justify-between mb-2 text-sm font-medium">
            <span class="text-slate-600">Transporte</span>
            <span class="text-slate-800">$120 / <span class="text-slate-400">$200</span></span>
          </div>
          <div class="w-full bg-slate-100 rounded-full h-2.5">
            <div class="bg-blue-500 h-2.5 rounded-full" style="width: 60%"></div>
          </div>
        </div>

        <div>
          <div class="flex justify-between mb-2 text-sm font-medium">
            <span class="text-slate-600">Entretenimiento</span>
            <span class="text-slate-800">$80 / <span class="text-slate-400">$100</span></span>
          </div>
          <div class="w-full bg-slate-100 rounded-full h-2.5">
            <div class="bg-amber-500 h-2.5 rounded-full" style="width: 80%"></div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
