<div class="flex flex-col md:flex-row h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 overflow-hidden transition-colors duration-300">

  <div class="md:hidden flex items-center justify-between bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 p-4 shadow-sm z-30 transition-colors duration-300">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 rounded-lg flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1 class="text-xl font-black text-slate-900 dark:text-white tracking-tight">
        Finova
      </h1>
    </div>
    
    <button (click)="isMenuOpen = true" class="text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white focus:outline-none p-1">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </div>

  <div *ngIf="isMenuOpen" (click)="isMenuOpen = false" class="fixed inset-0 bg-slate-900/50 z-40 md:hidden transition-opacity"></div>

  <aside 
    [class.-translate-x-full]="!isMenuOpen" 
    [class.translate-x-0]="isMenuOpen"
    class="fixed inset-y-0 left-0 w-72 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col p-6 shadow-2xl md:shadow-none z-50 transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0">

    <button (click)="isMenuOpen = false" class="absolute top-5 right-5 text-slate-400 dark:text-slate-500 hover:text-slate-800 dark:hover:text-white md:hidden">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <div class="hidden md:flex items-center gap-3 mb-8 px-2">
      <div class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 rounded-xl flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight">
        Finova
      </h1>
    </div>

    <nav class="space-y-2 flex-1 mt-6 md:mt-0">
      
      <!-- CLIENT MENU -->
      <ng-container *ngIf="!isAdmin">
        <a routerLink="/" 
           (click)="isMenuOpen = false"
           routerLinkActive="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 font-bold"
           [routerLinkActiveOptions]="{exact: true}"
           class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
          Dashboard
        </a>

        <a routerLink="/transactions" 
           (click)="isMenuOpen = false"
           routerLinkActive="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 font-bold"
           class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" />
          </svg>
          Movimientos
        </a>

        <a routerLink="/budgets" 
           (click)="isMenuOpen = false"
           routerLinkActive="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 font-bold"
           class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z" />
          </svg>
          Presupuestos
        </a>

        <a routerLink="/savings" 
           (click)="isMenuOpen = false"
           routerLinkActive="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 font-bold"
           class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Ahorros
        </a>

        <a routerLink="/banks" 
           (click)="isMenuOpen = false"
           routerLinkActive="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 font-bold"
           class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6.75h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008zm0 3h.008v.008h-.008v-.008zm0 3h.008v.008h-.008v-.008z" />
          </svg>
          Bancos
        </a>

        <a routerLink="/settings" 
           (click)="isMenuOpen = false"
           routerLinkActive="bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 font-bold"
           class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Configuración
        </a>
      </ng-container>

      <!-- ADMIN MENU -->
      <ng-container *ngIf="isAdmin">
        <a routerLink="/admin/dashboard" 
           (click)="isMenuOpen = false"
           routerLinkActive="bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400 font-bold"
           class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 group-hover:text-purple-500 dark:group-hover:text-purple-400 transition-colors">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
          Panel Global
        </a>

        <a routerLink="/admin/users" 
           (click)="isMenuOpen = false"
           routerLinkActive="bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400 font-bold"
           class="flex items-center gap-3 p-3 rounded-xl text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 group-hover:text-purple-500 dark:group-hover:text-purple-400 transition-colors">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
          </svg>
          Usuarios
        </a>
      </ng-container>

    </nav>

    <div class="mt-auto border-t border-slate-100 dark:border-slate-700 pt-6">
      <div class="flex items-center gap-3 px-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 border-2 border-white dark:border-slate-800 shadow-sm overflow-hidden flex items-center justify-center">
          <img *ngIf="currentUser?.profilePicture" [src]="currentUser.profilePicture" class="w-full h-full object-cover">
          <span *ngIf="!currentUser?.profilePicture" class="text-slate-500 dark:text-slate-300 font-bold">{{ userInitial }}</span>
        </div>
        <div *ngIf="currentUser">
          <p class="text-sm font-bold text-slate-800 dark:text-white truncate max-w-[120px]">{{ currentUser.username }}</p>
          <p class="text-xs text-slate-400 dark:text-slate-500 truncate">{{ currentUser.email }}</p>
        </div>
      </div>
      
      <button 
        (click)="theme.toggleTheme()"
        class="w-full mb-3 flex items-center justify-center gap-2 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 font-medium py-2.5 rounded-xl transition-colors duration-200"
      >
        <ng-container *ngIf="!theme.isDark">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          Modo Oscuro
        </ng-container>
        <ng-container *ngIf="theme.isDark">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
          </svg>
          Modo Claro
        </ng-container>
      </button>

      <button 
        (click)="logout()"
        class="w-full flex items-center justify-center gap-2 bg-rose-50 dark:bg-rose-900/30 hover:bg-rose-100 dark:hover:bg-rose-900/50 text-rose-600 dark:text-rose-400 font-semibold py-3 rounded-xl transition-colors duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
        </svg>
        Cerrar sesión
      </button>
    </div>

  </aside>

  <main class="flex-1 flex flex-col h-full overflow-y-auto bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    <router-outlet></router-outlet>
  </main>

  <!-- TOAST NOTIFICATIONS CONTAINER -->
  <div class="fixed top-4 right-4 z-[60] flex flex-col gap-2 max-w-sm pointer-events-none">
    <div *ngFor="let toast of toasts" 
         class="pointer-events-auto overflow-hidden bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 p-4 animate-slide-in-right transform transition-all flex items-start gap-3">
      
      <!-- Icons based on type -->
      <div [ngClass]="{
        'text-emerald-500 bg-emerald-50 dark:bg-emerald-900/30': toast.type === 'success',
        'text-rose-500 bg-rose-50 dark:bg-rose-900/30': toast.type === 'error',
        'text-blue-500 bg-blue-50 dark:bg-blue-900/30': toast.type === 'info'
      }" class="p-2 rounded-lg shrink-0">
        
        <svg *ngIf="toast.type === 'success'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>

        <svg *ngIf="toast.type === 'error'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>

        <svg *ngIf="toast.type === 'info'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
        </svg>
      </div>

      <div class="flex-1">
        <h4 class="text-sm font-bold text-slate-900 dark:text-white">{{ toast.title }}</h4>
        <p *ngIf="toast.message" class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">{{ toast.message }}</p>
      </div>

      <button (click)="removeToast(toast.id)" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

    </div>
  </div>

  <!-- 🤖 NOVA (AI MASCOT) -->
  <div class="fixed bottom-6 right-6 z-[70] flex flex-col items-end pointer-events-none">
    
    <!-- Chat Window -->
    <div *ngIf="isNovaOpen" class="pointer-events-auto w-80 md:w-96 bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 mb-4 overflow-hidden flex flex-col animate-fade-in-up origin-bottom-right">
      
      <!-- Header -->
      <div class="bg-indigo-600 dark:bg-indigo-900/80 p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center border border-white/30">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-6 h-6 text-white">
              <g transform="translate(10, 10)">
                <line x1="40" y1="15" x2="40" y2="0" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                <circle cx="40" cy="0" r="4" fill="currentColor"/>
                <rect x="15" y="15" width="50" height="40" rx="10" fill="currentColor" opacity="0.3"/>
                <rect x="15" y="15" width="50" height="40" rx="10" stroke="currentColor" stroke-width="3" fill="none"/>
                <rect x="25" y="25" width="10" height="8" rx="3" fill="currentColor"/>
                <rect x="45" y="25" width="10" height="8" rx="3" fill="currentColor"/>
                <line x1="30" y1="42" x2="50" y2="42" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              </g>
            </svg>
          </div>
          <div>
            <h3 class="text-white font-bold text-sm">Nova</h3>
            <p class="text-indigo-200 text-xs">Asesora Financiera IA</p>
          </div>
        </div>
        <button (click)="toggleNova()" class="text-indigo-200 hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Messages Area -->
      <div class="flex-1 h-80 p-4 overflow-y-auto bg-slate-50 dark:bg-slate-900/50 flex flex-col gap-3">
        <div *ngFor="let msg of novaMessages" [ngClass]="msg.isBot ? 'items-start' : 'items-end'" class="flex flex-col">
          <div [ngClass]="msg.isBot ? 'bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 rounded-tr-xl' : 'bg-indigo-600 text-white rounded-tl-xl'" 
               class="max-w-[85%] px-4 py-2.5 rounded-b-xl shadow-sm text-sm whitespace-pre-wrap">
            {{ msg.text }}
          </div>
        </div>
        <div *ngIf="isNovaTyping" class="flex items-start">
          <div class="bg-white dark:bg-slate-700 text-slate-500 rounded-b-xl rounded-tr-xl px-4 py-3 shadow-sm flex items-center gap-1">
            <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
            <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="p-3 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex gap-2">
        <input type="text" [(ngModel)]="novaInput" (keyup.enter)="sendNovaMessage()" placeholder="Pregúntale a Nova..." 
               class="flex-1 bg-slate-100 dark:bg-slate-900 border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none text-slate-800 dark:text-slate-200">
        <button (click)="sendNovaMessage()" [disabled]="!novaInput.trim() || isNovaTyping" 
                class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white p-2 rounded-xl transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
          </svg>
        </button>
      </div>

    </div>

    <!-- Mascot Button and Speech Bubble -->
    <div class="relative group flex items-end justify-center pointer-events-auto">
      
      <!-- Proactive Speech Bubble -->
      <div *ngIf="proactiveMessage && !isNovaOpen" class="absolute bottom-full mb-4 w-64 bg-white dark:bg-slate-800 p-3 rounded-2xl rounded-br-none shadow-xl border border-slate-200 dark:border-slate-700 animate-fade-in-up">
        <p class="text-xs text-slate-700 dark:text-slate-300">{{ proactiveMessage }}</p>
        <div class="absolute -bottom-2 right-4 w-4 h-4 bg-white dark:bg-slate-800 border-b border-r border-slate-200 dark:border-slate-700 transform rotate-45"></div>
      </div>

      <!-- Mascot Image -->
      <button (click)="toggleNova()" class="relative outline-none group animate-pace cursor-pointer drop-shadow-2xl hover:scale-110 transition-transform">
        <!-- Reemplazaremos el SVG por una imagen real. (El usuario debe guardar la imagen en assets) -->
        <img src="assets/img/nova.png" alt="Nova" class="h-32 object-contain pointer-events-none" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4712/4712139.png'">
        
        <span *ngIf="!isNovaOpen && !proactiveMessage" class="absolute top-2 right-2 w-4 h-4 bg-rose-500 rounded-full border-2 border-white animate-ping"></span>
        <span *ngIf="!isNovaOpen && !proactiveMessage" class="absolute top-2 right-2 w-4 h-4 bg-rose-500 rounded-full border-2 border-white"></span>
      </button>

      <!-- Tooltip -->
      <div *ngIf="!proactiveMessage" class="absolute bottom-full mb-2 bg-slate-800 text-white text-xs font-bold px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
        ¡Haz clic en mí!
        <div class="absolute left-1/2 -bottom-1 -translate-x-1/2 w-2 h-2 bg-slate-800 rotate-45"></div>
      </div>
    </div>
  </div>

</div>
