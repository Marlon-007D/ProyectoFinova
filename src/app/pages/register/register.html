<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6 font-sans">
  <div class="w-full max-w-md bg-white border border-slate-100 rounded-[2rem] p-8 md:p-10 shadow-2xl shadow-slate-200/50">

    <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
      </svg>
    </div>

    <h1 class="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">Crea tu cuenta</h1>
    <p class="text-slate-500 mb-8 font-medium">Únete a <span class="text-emerald-600 font-bold">Finova</span></p>

    <form class="space-y-5" (ngSubmit)="register()">

      <div>
        <label class="block text-sm font-semibold mb-2 text-slate-700">Nombre de Usuario</label>
        <div class="relative">
          <input type="text" [(ngModel)]="username" name="username" placeholder="Tu usuario"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-slate-700">Correo electrónico</label>
        <div class="relative">
          <input type="email" [(ngModel)]="email" name="email" placeholder="correo@ejemplo.com"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-slate-700">Contraseña</label>
        <div class="relative">
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all">
        </div>
      </div>

      <button type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.98] text-white font-bold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-emerald-500/30 mt-4">
        Registrarse
      </button>

    </form>

    <p class="text-center text-slate-500 text-sm mt-8">
      ¿Ya tienes una cuenta?
      <a routerLink="/login" class="font-bold text-emerald-600 hover:text-emerald-500 transition-colors">Inicia sesión</a>
    </p>

  </div>
</div>
