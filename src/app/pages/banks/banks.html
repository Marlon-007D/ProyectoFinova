<div class="max-w-7xl mx-auto p-4 md:p-8 text-slate-800 dark:text-slate-100">
  
  <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-8">
    Cuentas Bancarias
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

    @for (bank of banks; track bank.name) {

      <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col">
        
        <div class="flex items-start justify-between mb-2">
          
          <div class="flex items-center gap-3">

            <div
              class="p-2.5 rounded-xl"
              [ngClass]="{
                'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/40 dark:text-emerald-400': bank.color === 'emerald',
                'bg-blue-50 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400': bank.color === 'blue',
                'bg-amber-50 text-amber-600 dark:bg-amber-900/40 dark:text-amber-400': bank.color === 'amber'
              }"
            >

              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.315 48.315 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" />
              </svg>

            </div>

            <h2 class="text-xl font-bold text-slate-800 dark:text-white">
              {{ bank.name }}
            </h2>

          </div>
          
          <span
            class="inline-flex items-center gap-1.5 py-1 px-2.5 rounded-full text-xs font-medium border"
            [ngClass]="{
              'bg-emerald-50 text-emerald-700 border-emerald-100 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800': bank.color === 'emerald',
              'bg-blue-50 text-blue-700 border-blue-100 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800': bank.color === 'blue',
              'bg-amber-50 text-amber-700 border-amber-100 dark:bg-amber-900/30 dark:text-amber-400 dark:border-amber-800': bank.color === 'amber'
            }"
          >

            <span
              class="w-1.5 h-1.5 rounded-full"
              [ngClass]="{
                'bg-emerald-500': bank.color === 'emerald',
                'bg-blue-500': bank.color === 'blue',
                'bg-amber-500': bank.color === 'amber'
              }"
            ></span>

            Conectado

          </span>

        </div>

        <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-6 ml-14">
          {{ bank.type }}
        </p>

        <h3 class="text-4xl font-black text-slate-800 dark:text-white mb-8 tracking-tight">
          {{ bank.balance }}
        </h3>

        <button
          class="mt-auto w-full font-semibold py-3 rounded-xl transition-colors duration-200"
          [ngClass]="{
            'bg-emerald-50 hover:bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:hover:bg-emerald-900/50 dark:text-emerald-400': bank.color === 'emerald',
            'bg-blue-50 hover:bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:hover:bg-blue-900/50 dark:text-blue-400': bank.color === 'blue',
            'bg-amber-50 hover:bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:hover:bg-amber-900/50 dark:text-amber-400': bank.color === 'amber'
          }"
        >
          Ver movimientos
        </button>

      </div>

    }

  </div>
</div>
