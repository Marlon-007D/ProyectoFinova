<div class="max-w-7xl mx-auto p-4 md:p-8">

  <div class="flex justify-between items-center mb-8">
    
    <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight">
      Movimientos
    </h1>

    <button class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 active:scale-95 transition-all duration-200 text-white font-bold px-6 py-3 rounded-xl shadow-lg shadow-emerald-500/30">

      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>

      Agregar
    </button>

  </div>

  <div class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">

    <div class="overflow-x-auto">

      <table class="w-full text-left border-collapse">

        <thead class="bg-slate-50/80 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">

          <tr>
            <th class="text-xs uppercase tracking-wider font-semibold text-slate-500 dark:text-slate-400 p-5">
              Fecha
            </th>

            <th class="text-xs uppercase tracking-wider font-semibold text-slate-500 dark:text-slate-400 p-5">
              Descripción
            </th>

            <th class="text-xs uppercase tracking-wider font-semibold text-slate-500 dark:text-slate-400 p-5">
              Tipo
            </th>

            <th class="text-xs uppercase tracking-wider font-semibold text-slate-500 dark:text-slate-400 p-5 text-right">
              Monto
            </th>
          </tr>

        </thead>

        <tbody class="divide-y divide-slate-100 dark:divide-slate-700">

          <tr
            *ngFor="let item of transactions"
            class="hover:bg-slate-50/50 dark:hover:bg-slate-700/50 transition-colors group"
          >

            <td class="p-5 text-sm text-slate-500 dark:text-slate-400 font-medium">
              {{ item.date }}
            </td>

            <td class="p-5">

              <div class="flex items-center gap-3">

                <div
                  class="p-2 rounded-lg transition-all"
                  [ngClass]="{
                    'bg-rose-100 text-rose-600 dark:bg-rose-900/40 dark:text-rose-400': item.color === 'rose',
                    'bg-emerald-100 text-emerald-600 dark:bg-emerald-900/40 dark:text-emerald-400': item.color === 'emerald',
                    'bg-blue-100 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400': item.color === 'blue',
                    'bg-amber-100 text-amber-600 dark:bg-amber-900/40 dark:text-amber-400': item.color === 'amber',
                    'bg-violet-100 text-violet-600 dark:bg-violet-900/40 dark:text-violet-400': item.color === 'violet'
                  }"
                >
                  💰
                </div>

                <span class="text-sm font-bold text-slate-800 dark:text-white">
                  {{ item.description }}
                </span>

              </div>

            </td>

            <td class="p-5">

              <span
                class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold border"
                [ngClass]="{
                  'bg-rose-50 text-rose-600 border-rose-100 dark:bg-rose-900/30 dark:text-rose-400 dark:border-rose-800': item.type === 'Gasto',
                  'bg-emerald-50 text-emerald-600 border-emerald-100 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800': item.type === 'Ingreso'
                }"
              >
                {{ item.type }}
              </span>

            </td>

            <td
              class="p-5 text-right text-sm font-black"
              [ngClass]="{
                'text-rose-600 dark:text-rose-400': item.type === 'Gasto',
                'text-emerald-600 dark:text-emerald-400': item.type === 'Ingreso'
              }"
            >
              {{ item.amount }}
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
