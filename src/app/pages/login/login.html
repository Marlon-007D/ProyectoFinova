<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6 font-sans">

  <div class="w-full max-w-md bg-white border border-slate-100 rounded-[2rem] p-8 md:p-10 shadow-2xl shadow-slate-200/50">

    <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-6">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>

    <h1 class="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">
      Bienvenido de vuelta
    </h1>

    <p class="text-slate-500 mb-8 font-medium">
      Inicia sesión en <span class="text-emerald-600 font-bold">Finova</span>
    </p>

    <form class="space-y-5">

      <div>
        <label class="block text-sm font-semibold mb-2 text-slate-700">
          Correo electrónico
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
          </div>
          <input
            type="email"
            placeholder="correo@ejemplo.com"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 pl-11 text-slate-800 placeholder-slate-400 outline-none transition-all duration-300 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10"
          >
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold mb-2 text-slate-700">
          Contraseña
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
          </div>
          <input
            type="password"
            placeholder="••••••••"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 pl-11 text-slate-800 placeholder-slate-400 outline-none transition-all duration-300 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10"
          >
        </div>
        
        <div class="flex justify-end mt-2">
          <a href="#" class="text-sm font-medium text-emerald-600 hover:text-emerald-500 transition-colors">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </div>

      <button
        type="submit"
        class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.98] text-white font-bold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-emerald-500/30 mt-4"
      >
        Iniciar sesión
      </button>

    </form>

    <p class="text-center text-slate-500 text-sm mt-8">
      ¿No tienes una cuenta? 
      <a href="#" class="font-bold text-emerald-600 hover:text-emerald-500 transition-colors">Regístrate aquí</a>
    </p>

  </div>

</div>
