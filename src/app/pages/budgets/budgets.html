<div class="max-w-7xl mx-auto p-4 md:p-8 text-slate-800 dark:text-slate-100">

  <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-8">
    Presupuestos
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    @for (budget of budgets; track budget.title) {

      <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-shadow duration-300">

        <div class="flex items-center justify-between mb-6">

          <div class="flex items-center gap-3">

            <div
              class="p-2.5 rounded-xl"
              [ngClass]="{
                'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/40 dark:text-emerald-400': budget.color === 'emerald',
                'bg-blue-50 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400': budget.color === 'blue',
                'bg-amber-50 text-amber-600 dark:bg-amber-900/40 dark:text-amber-400': budget.color === 'amber',
                'bg-rose-50 text-rose-600 dark:bg-rose-900/40 dark:text-rose-400': budget.color === 'rose'
              }"
            >

              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007z" />
              </svg>

            </div>

            <h2 class="text-lg font-bold text-slate-800 dark:text-white">
              {{ budget.title }}
            </h2>

          </div>

          <span
            class="font-bold text-lg px-2 py-1 rounded-lg"
            [ngClass]="{
              'text-emerald-600 bg-emerald-50 dark:bg-emerald-900/30 dark:text-emerald-400': budget.color === 'emerald',
              'text-blue-600 bg-blue-50 dark:bg-blue-900/30 dark:text-blue-400': budget.color === 'blue',
              'text-amber-600 bg-amber-50 dark:bg-amber-900/30 dark:text-amber-400': budget.color === 'amber',
              'text-rose-600 bg-rose-50 dark:bg-rose-900/30 dark:text-rose-400': budget.color === 'rose'
            }"
          >
            {{ budget.progress }}%
          </span>

        </div>

        <div class="mb-3 flex justify-between items-end text-sm font-medium">

          <span class="text-slate-500 dark:text-slate-400">
            Gastado
          </span>

          <span class="text-slate-800 dark:text-white text-base">
            ${{ budget.spent }}

            <span class="text-slate-400 dark:text-slate-500 text-sm">
              / ${{ budget.total }}
            </span>
          </span>

        </div>

        <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2.5">

          <div
            class="h-2.5 rounded-full transition-all duration-500"
            [style.width.%]="budget.progress"
            [ngClass]="{
              'bg-emerald-500': budget.color === 'emerald',
              'bg-blue-500': budget.color === 'blue',
              'bg-amber-500': budget.color === 'amber',
              'bg-rose-500': budget.color === 'rose'
            }"
          ></div>

        </div>

      </div>

    }

  </div>

</div>
