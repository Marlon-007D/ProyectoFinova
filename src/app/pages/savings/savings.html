<div class="max-w-7xl mx-auto p-4 md:p-8 text-slate-800 dark:text-slate-100">

  <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-8">
    Metas de Ahorro
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    @for (goal of goals; track goal.title) {

      <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-shadow duration-300">

        <div class="flex items-center justify-between mb-6">

          <div class="flex items-center gap-3">

            <div
              class="p-2.5 rounded-xl"
              [ngClass]="{
                'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/40 dark:text-emerald-400': goal.color === 'emerald',
                'bg-blue-50 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400': goal.color === 'blue',
                'bg-amber-50 text-amber-600 dark:bg-amber-900/40 dark:text-amber-400': goal.color === 'amber',
                'bg-rose-50 text-rose-600 dark:bg-rose-900/40 dark:text-rose-400': goal.color === 'rose',
                'bg-rose-50 text-violet-600 dark:bg-violet-900/40 dark:text-violet-400': goal.color === 'violet'
              }"
            >

              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25" />
              </svg>

            </div>

            <h2 class="text-lg font-bold text-slate-800 dark:text-white">
              {{ goal.title }}
            </h2>

          </div>

          <span
            class="font-bold text-lg px-2.5 py-1 rounded-lg"
            [ngClass]="{
              'text-emerald-600 bg-emerald-50 dark:bg-emerald-900/30 dark:text-emerald-400': goal.color === 'emerald',
              'text-blue-600 bg-blue-50 dark:bg-blue-900/30 dark:text-blue-400': goal.color === 'blue',
              'text-amber-600 bg-amber-50 dark:bg-amber-900/30 dark:text-amber-400': goal.color === 'amber',
              'text-rose-600 bg-rose-50 dark:bg-rose-900/30 dark:text-rose-400': goal.color === 'rose',
              'text-violet-600 bg-violet-50 dark:bg-violet-900/30 dark:text-violet-400': goal.color === 'violet'
            }"
          >
            {{ goal.progress }}%
          </span>

        </div>

        <div class="mb-3 flex justify-between items-end text-sm font-medium">

          <span class="text-slate-500 dark:text-slate-400">
            Ahorrado
          </span>

          <span class="text-slate-800 dark:text-white text-base">
            ${{ goal.saved }}

            <span class="text-slate-400 dark:text-slate-500 text-sm">
              / ${{ goal.total }}
            </span>
          </span>

        </div>

        <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2.5">

          <div
            class="h-2.5 rounded-full transition-all duration-500"
            [style.width.%]="goal.progress"
            [ngClass]="{
              'bg-emerald-500': goal.color === 'emerald',
              'bg-blue-500': goal.color === 'blue',
              'bg-amber-500': goal.color === 'amber',
              'bg-rose-500': goal.color === 'rose',
              'bg-violet-500': goal.color === 'violet'
            }"
          ></div>

        </div>

        <p
          class="text-xs mt-4 font-medium text-right"
          [ngClass]="{
            'text-slate-400 dark:text-slate-500': goal.progress < 80,
            'text-emerald-500 dark:text-emerald-400': goal.progress >= 80
          }"
        >
          Faltan ${{ goal.remaining }}
        </p>

      </div>

    }

  </div>

</div>
